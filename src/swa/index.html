<!doctype html>
<html>
  <head>
    <noscript>
      <meta http-equiv="refresh" content="0;url=/ja/index.html" />
    </noscript>
    <script>
      var lang = navigator.language;
      if (lang && lang.startsWith('ja')) {
        window.location.href = '/ja/index.html';
      } else {
        window.location.href = '/en-GB/index.html';
      }
    </script>
  </head>
  <body>
    <p>
      Redirecting to local site... If you are not redirected,
      <a href="/ja/index.html">click here</a>.
    </p>
  </body>
</html>
